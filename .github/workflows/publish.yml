name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.event.release.prerelease != true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Check Node and npm versions
        run: |
          node --version
          npm --version
          node <<'EOF'
          const [nmaj, nmin, npat] = process.versions.node.split('.').map(Number);
          if (
            nmaj < 22 ||
            (nmaj === 22 && (nmin < 14 || (nmin === 14 && npat < 0)))
          ) {
            console.error(
              `Node ${process.versions.node}: trusted publishing requires >= 22.14.0`,
            );
            process.exit(1);
          }

          const { execSync } = require('node:child_process');
          const npmVer = execSync('npm --version', { encoding: 'utf8' }).trim();
          const [maj, min, pat] = npmVer.split('.').map(Number);
          if (
            maj < 11 ||
            (maj === 11 && (min < 5 || (min === 5 && pat < 1)))
          ) {
            console.error(
              `npm ${npmVer}: trusted publishing requires >= 11.5.1`,
            );
            process.exit(1);
          }

          console.log(`Node ${process.versions.node}, npm ${npmVer} — OK`);
          EOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate version matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
          EXPECTED="${TAG#v}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($EXPECTED)"
            exit 1
          fi

      - name: Verify
        run: pnpm verify

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
